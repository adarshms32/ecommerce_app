        weight: 300
      - assets: assets/fonts/Poppins-BoldItalic.ttf
        weight: 300
      - assets: assets/fonts/Poppins-ExtraBold.ttf
        weight: 300
      - assets: assets/fonts/Poppins-ExtraBoldItalic.ttf
        weight: 300
      - assets: assets/fonts/Poppins-ExtraLight.ttf
        weight: 300
      - assets: assets/fonts/Poppins-ExtraLightItalic.ttf
        weight: 300
      - assets: assets/fonts/Poppins-Italic.ttf
        weight: 300
      - assets: assets/fonts/Poppins-Light.ttf
        weight: 300
      - assets: assets/fonts/Poppins-LightItalic.ttf
        weight: 300
      - assets: assets/fonts/Poppins-Medium.ttf
        weight: 300
      - assets: assets/fonts/Poppins-MediumItalic.ttf
