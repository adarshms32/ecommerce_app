name: ecommerce_app
description: "A new Flutter project."


publish_to: 'none' 
version: 1.0.0+1

environment:
  sdk: ^3.12.2


#------------------------PACKAGES--------------------------------------#

dependencies:
  flutter:
    sdk: flutter


 #----utility packages


 #  icons

  iconsax: ^0.0.8
  cupertino_icons: ^1.0.8

# state management
  get: ^4.6.5

# product spec


#----------------------./PACKAGES END-----------#

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^6.0.0





flutter:
  uses-material-design: true

  
#------------LOCAL ASSETS-----#
  assets:
    - assets/logos/
    - assets/icons/brands/
    - assets/images/

#----------------LOCAL FONTS-----------------#
fonts:
